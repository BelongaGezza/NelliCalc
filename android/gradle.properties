org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Do not auto-download SDK/NDK via Gradle (avoids InstallFailedException when the IDE/SDK
# manager cannot install components; install NDK via Android Studio SDK Manager or:
#   sdkmanager "ndk;28.2.13676358"
# Ensure sdk.dir in local.properties points at your Android SDK.
android.builder.sdkDownload=false
